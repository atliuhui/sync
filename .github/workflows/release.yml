name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', '**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Dependencies
        run: dotnet restore Sync.slnx --locked-mode

      - name: Run Tests
        run: dotnet test --solution Sync.slnx --configuration Release --no-restore --filter "TestCategory=CI"

  build:
    name: Build ${{ matrix.runtime }}
    runs-on: windows-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: win-x64
            artifact: sync-win-x64.zip
          - runtime: win-arm64
            artifact: sync-win-arm64.zip

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Derive Version From Tag
        shell: bash
        run: |
          REF="${GITHUB_REF_NAME#v}"        # e.g. 0.1.0-test
          NUMERIC="${REF%%-*}"              # e.g. 0.1.0
          echo "APP_VERSION=$REF"     >> "$GITHUB_ENV"
          echo "ASM_VERSION=$NUMERIC" >> "$GITHUB_ENV"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', '**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Dependencies
        run: dotnet restore Sync/Sync.csproj --locked-mode

      - name: Build Application
        shell: bash
        run: |
          dotnet publish Sync/Sync.csproj \
            --configuration Release \
            --runtime "${{ matrix.runtime }}" \
            --no-restore \
            --self-contained false \
            /p:Version="$APP_VERSION" \
            /p:AssemblyVersion="$ASM_VERSION" \
            /p:FileVersion="$ASM_VERSION" \
            /p:InformationalVersion="$APP_VERSION" \
            /p:PublishSingleFile=true \
            /p:DebugSymbols=false \
            /p:DebugType=None \
            /p:PublishReadyToRun=false \
            --output "artifacts/${{ matrix.runtime }}"

      - name: Package Artifact
        shell: pwsh
        run: |
          $source = "artifacts/${{ matrix.runtime }}"
          $destination = "artifacts/${{ matrix.artifact }}"
          if (Test-Path $destination) {
            Remove-Item -Path $destination -Force
          }
          Compress-Archive -Path "$source/*" -DestinationPath $destination -Force

      - name: Upload Packaged Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.runtime }}
          path: artifacts/${{ matrix.artifact }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    # Skip publishing a GitHub Release for *-test tags (build-only dry runs).
    if: ${{ !contains(github.ref_name, '-test') && !contains(github.ref_name, '-debug') }}
    permissions:
      contents: write

    steps:
      - name: Download Packaged Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Generate Checksums
        shell: bash
        run: |
          cd release-artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        # Pinned to v3.0.0 commit SHA for supply-chain safety.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: release-artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
