name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'Sync.slnx', 'Sync/**/*.csproj', 'Test/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Dependencies
        run: dotnet restore Sync.slnx

      - name: Run Tests
        run: dotnet test Sync.slnx --configuration Release --no-restore

  build:
    name: Build ${{ matrix.runtime }}
    runs-on: windows-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: win-x64
            artifact: sync-win-x64.zip

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Derive Version From Tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'Sync.slnx', 'Sync/**/*.csproj', 'Test/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Dependencies
        run: dotnet restore Sync/Sync.csproj --runtime "${{ matrix.runtime }}"

      - name: Build Application
        shell: bash
        run: |
          dotnet publish Sync/Sync.csproj \
            --configuration Release \
            --runtime "${{ matrix.runtime }}" \
            --no-restore \
            --self-contained false \
            /p:Version="$APP_VERSION" \
            /p:AssemblyVersion="$APP_VERSION" \
            /p:FileVersion="$APP_VERSION" \
            /p:InformationalVersion="${{ github.ref_name }}" \
            /p:IncludeSourceRevisionInInformationalVersion=false \
            /p:PublishSingleFile=true \
            /p:EnableCompressionInSingleFile=true \
            /p:DebugSymbols=false \
            /p:DebugType=None \
            /p:PublishReadyToRun=false \
            --output "artifacts/${{ matrix.runtime }}"

      - name: Package Artifact
        shell: pwsh
        run: |
          $source = "artifacts/${{ matrix.runtime }}"
          $destination = "artifacts/${{ matrix.artifact }}"
          if (Test-Path $destination) {
            Remove-Item -Path $destination -Force
          }
          Compress-Archive -Path "$source/*" -DestinationPath $destination -Force

      - name: Upload Packaged Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.runtime }}
          path: artifacts/${{ matrix.artifact }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Packaged Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
